name: CI

on:
  push:
    branches: [main, dev, "hotfix/**"]
  pull_request:
    branches: [main, dev]
  workflow_call: # Allow reuse from release.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info
  FDU_MOCK_ONLY: "true"
  FDU_TEST_FIXTURES: tests/fixtures/

jobs:
  # ── Lint & Format ──────────────────────────────────────
  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: clippy-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # NOTE: Enable in Phase 3 when fdu-web/frontend/ exists
  frontend-lint:
    name: frontend lint
    if: false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fdu-web/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fdu-web/frontend/package-lock.json
      - run: npm ci
      - run: npx eslint src/
      - run: npx tsc --noEmit

  # ── Unit Tests ─────────────────────────────────────────
  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    needs: [rustfmt, clippy]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # NOTE: Enable in Phase 3 when fdu-web/frontend/ exists
  frontend-tests:
    name: frontend tests
    if: false
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    defaults:
      run:
        working-directory: fdu-web/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fdu-web/frontend/package-lock.json
      - run: npm ci
      - run: npm test

  # NOTE: Enable in Phase 3 when fdu-web/frontend/ exists
  frontend-build:
    name: frontend build
    if: false
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    defaults:
      run:
        working-directory: fdu-web/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fdu-web/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Check bundle size
        run: |
          SIZE=$(find dist -type f | xargs cat | gzip -c | wc -c)
          echo "Gzipped bundle size: $SIZE bytes"
          if [ "$SIZE" -gt 204800 ]; then
            echo "::error::Bundle exceeds 200KB gzipped ($SIZE bytes)"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: fdu-web/frontend/dist/
          retention-days: 1

  # ── Integration Tests ──────────────────────────────────
  integration-tests:
    name: integration tests
    runs-on: ubuntu-latest
    needs: [unit-tests] # NOTE: Add frontend-build in Phase 3
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: integration-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Build CLI binary
        run: cargo build --release -p fdu-cli
      - name: Run CLI integration tests
        run: cargo test --release -p fdu-cli -- --test-threads=1 integration
      - name: Run Web API integration tests
        run: cargo test --release -p fdu-web -- --test-threads=1 integration
      - name: Run audit integration tests
        run: cargo test --release -p fdu-audit -- --test-threads=1

  # ── Fuzz Regression ──────────────────────────────────
  fuzz-regression:
    name: fuzz regression
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Run fuzz targets (10 seconds each)
        working-directory: crates/fdu-fuzz/fuzz
        run: |
          for target in fuzz_fat32_bpb fuzz_detect_fs fuzz_mbr fuzz_gpt fuzz_carving fuzz_usb_descriptors; do
            echo "::group::Fuzzing $target"
            cargo +nightly fuzz run "$target" -- -max_total_time=10 || true
            echo "::endgroup::"
          done

  # ── Cross-Platform Build ───────────────────────────────
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: [unit-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            mode: full
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            mode: cross
          - target: x86_64-apple-darwin
            runner: macos-13
            mode: check
          - target: aarch64-apple-darwin
            runner: macos-14
            mode: check
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            mode: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      # Cross-compilation for Linux ARM64
      - name: Install cross
        if: matrix.mode == 'cross'
        uses: taiki-e/install-action@cross
      - name: Build (cross)
        if: matrix.mode == 'cross'
        run: cross build --workspace --target ${{ matrix.target }}

      # Compile check for macOS / Windows
      - name: Check (compile only)
        if: matrix.mode == 'check'
        run: cargo check --workspace --target ${{ matrix.target }}

      # Full build + test for Linux x86_64
      - name: Build + Test (full)
        if: matrix.mode == 'full'
        run: |
          cargo build --workspace --release --target ${{ matrix.target }}
          cargo test --workspace --target ${{ matrix.target }}

      - name: Upload binary
        if: matrix.mode == 'full' || matrix.mode == 'cross'
        uses: actions/upload-artifact@v4
        with:
          name: fdu-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/fdu*
          retention-days: 7

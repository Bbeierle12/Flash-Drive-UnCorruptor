<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- USB drive body -->
  <rect x="32" y="20" width="64" height="88" rx="6" ry="6" fill="#2d3748" stroke="#4a5568" stroke-width="2"/>
  <!-- USB connector -->
  <rect x="44" y="4" width="40" height="20" rx="2" ry="2" fill="#a0aec0" stroke="#718096" stroke-width="1.5"/>
  <rect x="52" y="8" width="8" height="12" rx="1" fill="#e2e8f0"/>
  <rect x="68" y="8" width="8" height="12" rx="1" fill="#e2e8f0"/>
  <!-- Shield (security) -->
  <path d="M64 45 L82 53 L82 70 Q82 82 64 90 Q46 82 46 70 L46 53 Z" fill="#38a169" stroke="#276749" stroke-width="1.5"/>
  <!-- Checkmark on shield -->
  <polyline points="54,66 61,74 76,58" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Activity LED -->
  <circle cx="64" cy="100" r="4" fill="#48bb78"/>
</svg>
